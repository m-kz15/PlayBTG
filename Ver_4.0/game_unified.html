<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="./enchant/enchant.js"></script>
    <script src="./enchant/Box2dWeb-2.1.a.3.js"></script>
    <script src="./enchant/box2d.enchant.js"></script>
    <script src="./enchant/ui.enchant.js"></script>

    <link rel="stylesheet" href="style.css" id="css">

    <script src="WebStrage.js"></script>
    <script src="Repository.js"></script>
    <script src="TotalRepository.js"></script>
    <script src="game_unified.js"></script>
</head>
<body>
    <button id="button1">フルスクリーン表示</button>
    <button id="button2">解除</button>
    <button id="button3"><h2>ゲームの再起動</h2></button>

<script>
    // --- iOS 長押し禁止（ここに追加） ---
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('gesturestart', e => e.preventDefault());
    (() => {
        const isMobile = /iPhone|iPad|Android/.test(navigator.userAgent);

        const b1 = document.getElementById('button1');
        const b2 = document.getElementById('button2');
        const b3 = document.getElementById('button3');

        // --- 画面回転の取得（iOS/Android/PC すべて対応） ---
        const getAngle = () =>
            screen.orientation?.angle ??
            window.orientation ??
            0;

        // --- 初期ボタン表示 ---
        if (isMobile) {
            if (Math.abs(getAngle()) === 90) {
                b3.style.visibility = "hidden";
                b3.disabled = true;
            } else {
                b3.style.animation = "blinking 1s ease-out infinite";
                b1.style.visibility = "hidden";
                b1.disabled = true;
                b2.style.visibility = "hidden";
                b2.disabled = true;
            }
        } else {
            b3.style.visibility = "hidden";
            b3.disabled = true;
        }

        // --- スクロール禁止 ---
        const noscroll = e => e.preventDefault();

        window.addEventListener('load', () => {

            // --- フルスクリーン ---
            b1.addEventListener('click', () => {
                document.addEventListener('touchmove', noscroll, { passive: false });
                document.addEventListener('wheel', noscroll, { passive: false });

                const el = document.body;
                (el.requestFullscreen ||
                el.webkitRequestFullscreen ||
                el.mozRequestFullScreen ||
                el.msRequestFullscreen ||
                el.webkitEnterFullscreen)?.call(el);
            });

            // --- フルスクリーン解除 ---
            b2.addEventListener('click', () => {
                document.removeEventListener('touchmove', noscroll);
                document.removeEventListener('wheel', noscroll);

                (document.exitFullscreen ||
                document.webkitExitFullscreen ||
                document.mozCancelFullScreen ||
                document.msExitFullscreen)?.call(document);
            });

            // --- 再起動 ---
            b3.addEventListener('click', () => {
                window.location.replace("game_unified.html");
            });
        });
    })();
</script>

</body>
</html>
